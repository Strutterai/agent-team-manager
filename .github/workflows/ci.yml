name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build (includes typecheck)
        run: npm run build

      - name: Audit dependencies for known vulnerabilities
        run: npm audit --audit-level=high

      - name: Check dependency licenses
        run: npx --yes license-checker-rseidelsohn --production --onlyAllow "MIT;MIT OR Apache-2.0;Apache-2.0;BSD;BSD-2-Clause;BSD-3-Clause;ISC;CC0-1.0;CC-BY-4.0;Unlicense;Python-2.0;0BSD;BlueOak-1.0.0"
