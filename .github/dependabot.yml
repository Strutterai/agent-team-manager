version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: deps
      prefix-development: deps-dev
      include: scope
    ignore:
      # Keep @types/node aligned with the runtime Node version (engines: >=20).
      # Bumping the typings major would let typecheck accept APIs that don't
      # exist at runtime. Allow patch and minor only.
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
    groups:
      # Bundle minor + patch updates into one PR per ecosystem to reduce noise
      dev-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch
      production-dependencies:
        dependency-type: production
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    commit-message:
      prefix: ci
      include: scope
